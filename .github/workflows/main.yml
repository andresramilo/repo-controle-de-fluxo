name: Workflow evento
on:
  workflow_dispatch:
    inputs:
      exemplo-input:
        type: string
        description: "Teste de input"
        required: true
jobs:
  teste:
    runs-on: ubuntu-latest
    steps:
      - name: Action de Teste
        run: |
          echo "Disparou um evento com o input: ${{ inputs.exemplo-input }}"
